      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0071E3"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
